<div class="min-h-screen bg-[#020617] flex items-center justify-center relative overflow-hidden font-sans select-none">
  <!-- Background elements: kept subtle for performance and focus -->
  <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-600/10 rounded-full blur-[100px]">
  </div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-emerald-600/10 rounded-full blur-[100px]">
  </div>

  <!-- Main Container: Mobile focus -->
  <div
    class="w-full h-full sm:h-auto sm:max-w-[420px] sm:rounded-[3rem] sm:border sm:border-white/[0.08] backdrop-blur-[32px] bg-white/[0.02] flex flex-col shadow-2xl relative z-10 transition-all duration-500 overflow-y-auto">

    <!-- Header / Logo Area -->
    <div class="px-8 pt-16 pb-12 flex flex-col items-center text-center">
      <div
        class="w-20 h-20 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-3xl mb-6 flex items-center justify-center shadow-2xl shadow-blue-500/20 transform rotate-3 active:rotate-0 transition-transform duration-300">
        <span class="text-4xl font-black text-white">T</span>
      </div>
      <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">TauObra</h1>
      <p class="text-slate-400 text-sm font-medium leading-relaxed max-w-[240px]">Gerencie sua obra de qualquer lugar.
      </p>
    </div>
    <!-- Form Area: Balanced sizing -->
    <div class="flex-1 px-8 pb-10 sm:pb-12 flex flex-col justify-center">
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        
        <div *ngIf="errorMessage()" class="p-3 mb-2 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 text-xs text-center">
          {{ errorMessage() }}
        </div>

        <app-input formControlName="email" label="E-mail" placeholder="usuario@exemplo.com" type="email">
        </app-input>

        <app-input formControlName="password" label="Senha" placeholder="••••••••" type="password">
        </app-input>

        <app-button 
          [disabled]="loading() || loginForm.invalid"
          type="submit" 
          [label]="loading() ? 'Autenticando...' : 'Entrar no sistema'">
        </app-button>
      </form>
    </div>
  </div>
</div>
