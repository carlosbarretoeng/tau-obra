<div class="relative w-full aspect-square flex flex-col items-center justify-center p-0">
  <svg viewBox="0 0 200 200" class="w-full h-full transform transition-all duration-700 hover:scale-[1.02]">
    <!-- Level 1: Stages -->
    @for (arc of innerArcs(); track arc.label) {
    <g>
      <path [attr.d]="arc.path" [attr.fill]="arc.color" (click)="selectSegment(arc)"
        [class.selected]="selectedSegment()?.label === arc.label"
        class="opacity-90 hover:opacity-100 transition-all cursor-pointer hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.1)] active:scale-95 origin-center" />
    </g>
    }

    <!-- Level 2: Sub-stages -->
    @for (arc of outerArcs(); track arc.label) {
    <g>
      <path [attr.d]="arc.path" [attr.fill]="arc.color" (click)="selectSegment(arc)"
        [class.selected]="selectedSegment()?.label === arc.label"
        class="opacity-60 hover:opacity-90 transition-all cursor-pointer active:scale-95 origin-center" />
    </g>
    }
  </svg>

  <!-- Central Info -->
  <div class="absolute top-[130px] flex flex-col items-center justify-center text-center pointer-events-none">
    <span class="text-[9px] font-bold uppercase tracking-widest text-slate-500">Total</span>
    <span class="text-xl font-black text-white">R$ {{ centralValue() | shortNumber }}</span>
  </div>

  <!-- Detail Display below SVG -->
  @if (selectedSegment()) {
  <div class="relative mt-0 w-full px-4 animate-in fade-in zoom-in-95 duration-300">
    <div
      class="bg-slate-950/80 backdrop-blur-3xl border border-white/[0.1] rounded-2xl p-4 flex items-center justify-between shadow-2xl">
      <div class="flex items-center gap-3">
        <div class="w-2 h-8 rounded-full" [style.background-color]="selectedSegment()?.color"></div>
        <div class="flex flex-col">
          <span class="text-[10px] font-black uppercase tracking-[0.1em] text-slate-500">{{ selectedSegment()?.label
            }}</span>
          <span class="text-lg font-black text-white">R$ {{ selectedSegment()!.value | shortNumber }}</span>
        </div>
      </div>
      <button (click)="selectSegment(selectedSegment()!)" class="text-slate-500 hover:text-white transition-colors">
        <span class="text-[10px] font-bold uppercase underline">Fechar</span>
      </button>
    </div>
  </div>
  }

  <!-- Dynamic Legend (Simulated) -->
  <div class="relative mt-4 flex justify-center gap-4">
    @for(segment of data(); track segment.label) {
    <div class="flex items-center gap-1.5">
      <div class="w-3 h-3 rounded-full" [style.background-color]="segment.color"></div>
      <span class="text-[10px] font-bold text-slate-400">{{ segment.label }}</span>
    </div>
    }
  </div>
</div>
