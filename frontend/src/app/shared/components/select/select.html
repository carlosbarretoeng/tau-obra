<div class="space-y-1.5 transition-transform duration-300 focus-within:-translate-y-0.5">
  <label *ngIf="label()" class="block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500 ml-1">
    {{ label() }}
  </label>
  <div class="relative group">
    <select 
      [value]="value"
      [disabled]="disabled"
      (change)="handleValueChange($event)"
      (blur)="onTouched()"
      [ngClass]="{ 'opacity-50 cursor-not-allowed': disabled }"
      class="w-full bg-slate-900/60 border border-white/[0.05] rounded-xl py-3.5 px-5 pr-12 text-white text-sm outline-none focus:ring-2 focus:ring-blue-500/40 focus:bg-slate-900/80 transition-all duration-300 appearance-none">
      
      <option value="" disabled selected>{{ placeholder() }}</option>
      <option *ngFor="let option of options()" [value]="option.value">
        {{ option.label }}
      </option>
    </select>
    
    <!-- Chevron Icon -->
    <div class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-500 transition-colors pointer-events-none">
      <lucide-icon [name]="icon()" class="w-4 h-4"></lucide-icon>
    </div>
  </div>
</div>
