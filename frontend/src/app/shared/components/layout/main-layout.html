<div class="min-h-screen bg-[#020617] text-white font-sans flex flex-col relative overflow-hidden">
  <!-- FAB MENU OVERLAY (Z-10 to stay below Header/Nav) -->
  @if (isFabOpen()) {
  <div (click)="toggleFab()"
    class="fixed inset-0 bg-slate-950/60 backdrop-blur-md z-10 animate-in fade-in duration-300">
  </div>

  <div
    class="fixed bottom-36 left-1/2 -translate-x-[calc(50%-68px)] z-30 flex flex-col items-end gap-5 animate-in slide-in-from-bottom-10 duration-500">

    <!-- Diário de Obra -->
    <div class="flex items-center gap-4 group cursor-pointer hover:-translate-x-1 transition-transform">
      <span
        class="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-blue-400 order-1 text-right">Diário</span>
      <div
        class="w-14 h-14 bg-slate-900 border border-white/10 rounded-2xl flex items-center justify-center text-slate-300 group-hover:text-blue-400 group-hover:border-blue-400/50 transition-all shadow-2xl order-2">
        <lucide-icon name="book-open" class="w-6 h-6"></lucide-icon>
      </div>
    </div>

    <!-- Entregas -->
    <div class="flex items-center gap-4 group cursor-pointer hover:-translate-x-1 transition-transform">
      <span
        class="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-emerald-400 order-1 text-right">Entregas</span>
      <div
        class="w-14 h-14 bg-slate-900 border border-white/10 rounded-2xl flex items-center justify-center text-slate-300 group-hover:text-emerald-400 group-hover:border-emerald-400/50 transition-all shadow-2xl order-2">
        <lucide-icon name="truck" class="w-6 h-6"></lucide-icon>
      </div>
    </div>

    <!-- Orçamentos -->
    <div class="flex items-center gap-4 group cursor-pointer hover:-translate-x-1 transition-transform">
      <span
        class="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-amber-400 order-1 text-right">Orçamentos</span>
      <div
        class="w-14 h-14 bg-slate-900 border border-white/10 rounded-2xl flex items-center justify-center text-slate-300 group-hover:text-amber-400 group-hover:border-amber-400/50 transition-all shadow-2xl order-2">
        <lucide-icon name="calculator" class="w-6 h-6"></lucide-icon>
      </div>
    </div>

    <!-- Despesas -->
    <div class="flex items-center gap-4 group cursor-pointer hover:-translate-x-1 transition-transform">
      <span
        class="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-rose-400 order-1 text-right">Despesas</span>
      <div
        class="w-14 h-14 bg-slate-900 border border-white/10 rounded-2xl flex items-center justify-center text-slate-300 group-hover:text-rose-400 group-hover:border-rose-400/50 transition-all shadow-2xl order-2">
        <lucide-icon name="dollar-sign" class="w-6 h-6"></lucide-icon>
      </div>
    </div>
  </div>
  }

  <!-- Background Accents -->
  <div
    class="absolute top-[-10%] right-[-10%] w-[70%] h-[40%] bg-blue-600/10 rounded-full blur-[120px] pointer-events-none">
  </div>
  <div
    class="absolute bottom-[20%] left-[-10%] w-[60%] h-[30%] bg-emerald-600/10 rounded-full blur-[100px] pointer-events-none">
  </div>

  <!-- Header Section: Shared -->
  <header class="pt-6 px-6 pb-4 flex flex-col gap-1 relative z-20 animate-in slide-in-from-top-4 duration-700">
    <div class="flex items-center justify-between">
      <div class="flex flex-col">
        <h1 class="text-xl font-black tracking-tight">Fala, {{ apelido() }}!</h1>
        <p class="text-slate-500 text-xs font-medium">{{ userEmail() || 'usuario@obra.com' }}</p>
      </div>

      <div class="relative">
        <button (click)="toggleDropdown()"
          class="w-10 h-10 flex items-center justify-center bg-white/[0.03] border border-white/[0.08] rounded-xl text-slate-400 active:scale-90 transition-all">
          <lucide-icon name="user" class="w-4 h-4"></lucide-icon>
        </button>

        <!-- Dropdown Menu -->
        @if (isDropdownOpen()) {
        <div>
          <div
            class="absolute right-0 mt-3 w-48 bg-slate-900 backdrop-blur-3xl border border-white/[0.08] rounded-2xl shadow-2xl py-2 z-[60] animate-in zoom-in-95 duration-200 origin-top-right">

            <button (click)="navigateToProfile()"
              class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-slate-300 hover:bg-white/[0.05] transition-colors text-left">
              <lucide-icon name="user" class="w-4 h-4 text-blue-500"></lucide-icon>
              Meu Perfil
            </button>

            <div class="h-px bg-white/[0.05] mx-2 my-1"></div>

            <button (click)="logout()"
              class="w-full flex items-center gap-3 px-4 py-3 text-sm font-bold text-red-400 hover:bg-red-500/10 transition-colors text-left">
              <lucide-icon name="eye-off" class="w-4 h-4"></lucide-icon>
              Encerrar Sessão
            </button>
          </div>
        </div>
        }

        <!-- Backdrop -->
        @if (isDropdownOpen()) {
        <div (click)="closeDropdown()" class="fixed inset-0 z-50"></div>
        }
      </div>
    </div>
  </header>

  <!-- Page Content: Inject current route here -->
  <main class="flex-1 overflow-y-auto relative px-0">
    <router-outlet></router-outlet>
  </main>

  <!-- Bottom Navigation: Shared -->
  <nav
    class="fixed bottom-0 left-0 right-0 h-20 bg-slate-900/60 backdrop-blur-3xl border-t border-white/[0.1] px-6 flex items-center justify-between z-20 shadow-2xl">

    <a routerLink="/dashboard" routerLinkActive="text-white" [routerLinkActiveOptions]="{exact: true}"
      class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
      <lucide-icon name="home" class="w-6 h-6"></lucide-icon>
      <span class="text-[8px] font-bold uppercase tracking-wider">Início</span>
      <div class="w-1 h-1 bg-white rounded-full opacity-0 router-link-active:opacity-100"></div>
    </a>

    <a routerLink="/dashboard/fornecedores" routerLinkActive="text-white"
      class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
      <lucide-icon name="truck" class="w-6 h-6"></lucide-icon>
      <span class="text-[8px] font-bold uppercase tracking-wider">Fornecedores</span>
      <div class="w-1 h-1 bg-white rounded-full opacity-0 router-link-active:opacity-100"></div>
    </a>

    <a routerLink="/dashboard/equipe" routerLinkActive="text-white"
      class="flex flex-col items-center gap-1 text-slate-500 transition-colors">
      <lucide-icon name="users" class="w-6 h-6"></lucide-icon>
      <span class="text-[8px] font-bold uppercase tracking-wider">Equipe</span>
      <div class="w-1 h-1 bg-white rounded-full opacity-0 router-link-active:opacity-100"></div>
    </a>

    <!-- Highlighted Central Action: Lançamentos (FAB) -->
    <div class="flex flex-col items-center -mt-14 z-30" (click)="toggleFab()">
      <div
        class="w-18 h-18 bg-gradient-to-tr from-blue-600 to-emerald-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-600/20 active:scale-90 transition-all cursor-pointer"
        [class.rotate-45]="isFabOpen()" [class.rounded-full]="isFabOpen()">
        <lucide-icon [name]="isFabOpen() ? 'plus' : 'house-plus'" class="w-10 h-10 text-white transition-all transform"
          [class.rotate-90]="isFabOpen()"></lucide-icon>
      </div>
      <span class="text-[9px] font-black uppercase tracking-widest text-emerald-500 mt-2">Lançamentos</span>
    </div>
  </nav>
</div>
