<div 
  *ngIf="loadingService.isLoading()" 
  class="fixed inset-0 z-[9999] flex flex-col items-center justify-center backdrop-blur-md bg-black/40 animate-in fade-in duration-300">
  
  <div class="relative flex items-center justify-center">
    <!-- Spinning rings -->
    <div class="absolute w-24 h-24 border-4 border-blue-500/20 rounded-full"></div>
    <div class="absolute w-24 h-24 border-t-4 border-blue-500 rounded-full animate-spin"></div>
    <div class="absolute w-24 h-24 border-r-4 border-emerald-500 rounded-full animate-spin animation-delay-500"></div>
    
    <!-- Pulsing Logo -->
    <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-emerald-500 rounded-2xl flex items-center justify-center shadow-2xl animate-pulse">
      <span class="text-2xl font-black text-white">T</span>
    </div>
  </div>
  
  <p class="mt-8 text-blue-100/70 font-bold uppercase tracking-[0.3em] text-[10px] animate-pulse">
    Carregando sistema...
  </p>
</div>
