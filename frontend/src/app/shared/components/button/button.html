<button [type]="type()" [disabled]="disabled()" (click)="onButtonClick()" [ngClass]="getClass()"
  [class.active:scale-[0.95]]="!disabled()">

  @if (icon()) {
  <lucide-icon [name]="icon()" class="w-4 h-4"></lucide-icon>
  }

  @if (title() || label()) {
  <span>{{ title() || label() }}</span>
  }

  <ng-content></ng-content>
</button>
